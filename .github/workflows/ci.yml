name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Shellcheck sclaude
        run: shellcheck sclaude
      - name: Shellcheck test_e2e.sh
        run: shellcheck test_e2e.sh
      - name: Zsh syntax check
        run: |
          sudo apt-get install -y zsh
          zsh -n sclaude

  lint-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Shellcheck
        run: shellcheck sclaude test_e2e.sh
      - name: Zsh syntax check
        run: zsh -n sclaude

  test-linux:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - name: Run E2E tests
        run: bash test_e2e.sh
