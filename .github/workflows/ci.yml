name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Shellcheck sclaude
        run: shellcheck sclaude
      - name: Shellcheck test_e2e.sh
        run: shellcheck test_e2e.sh

  test-linux:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E tests
        run: bash test_e2e.sh

  test-macos:
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install Docker
        run: brew install --cask docker
      - name: Run E2E tests
        run: bash test_e2e.sh
