name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Restrict permissions to minimum needed
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Shellcheck sclaude
        run: shellcheck sclaude
      - name: Shellcheck test_e2e.sh
        run: shellcheck test_e2e.sh
      - name: Zsh syntax check
        run: |
          sudo apt-get install -y zsh
          zsh -n sclaude

  lint-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shellcheck
        run: brew install shellcheck
      - name: Shellcheck
        run: shellcheck sclaude test_e2e.sh
      - name: Zsh syntax check
        run: zsh -n sclaude

  test-linux:
    # Only run E2E on trusted contexts (push to main or PRs from same repo)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - name: Run E2E tests
        run: bash test_e2e.sh
