name: CI

on:
  pull_request:

# Cancel in-progress runs for the same PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Restrict permissions to minimum needed
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title is conventional
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'
          if ! echo "$PR_TITLE" | grep -Eq "$pattern"; then
            echo "::error::PR title must follow Conventional Commits: <type>[optional scope]: <description>"
            echo "  Got: $PR_TITLE"
            echo "  Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Shellcheck sclaude
        run: shellcheck sclaude scodex
      - name: Shellcheck test_e2e.sh
        run: shellcheck test_e2e.sh
      - name: Shellcheck test_devcontainers.sh
        run: shellcheck test_devcontainers.sh
      - name: Zsh syntax check
        run: |
          sudo apt-get install -y zsh
          zsh -n sclaude
          zsh -n scodex

  lint-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shellcheck
        run: brew install shellcheck
      - name: Shellcheck
        run: shellcheck sclaude scodex test_e2e.sh test_devcontainers.sh
      - name: Zsh syntax check
        run: zsh -n sclaude && zsh -n scodex

  test-linux:
    # Only run E2E on trusted contexts (PRs from same repo, not forks)
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - name: Run E2E tests
        run: bash test_e2e.sh

  test-devcontainers:
    # Only run on trusted contexts (PRs from same repo, not forks)
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Run devcontainer build tests
        run: bash test_devcontainers.sh
