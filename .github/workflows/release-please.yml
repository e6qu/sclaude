name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  upload-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Upload scripts and update release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" sclaude scodex

          EXISTING=$(gh release view "$TAG" --json body --jq .body)
          INSTALL_INSTRUCTIONS=$(cat <<'EOF'

          ---

          ## Install / Update

          **Fresh install:**
          ```bash
          curl -fsSL https://github.com/e6qu/sclaude/releases/latest/download/sclaude -o sclaude
          chmod +x sclaude
          sudo mv sclaude /usr/local/bin/sclaude
          curl -fsSL https://github.com/e6qu/sclaude/releases/latest/download/scodex -o scodex
          chmod +x scodex
          sudo mv scodex /usr/local/bin/scodex
          ```

          **Update existing install:**
          ```bash
          sudo curl -fsSL https://github.com/e6qu/sclaude/releases/latest/download/sclaude -o /usr/local/bin/sclaude
          sudo chmod +x /usr/local/bin/sclaude
          sudo curl -fsSL https://github.com/e6qu/sclaude/releases/latest/download/scodex -o /usr/local/bin/scodex
          sudo chmod +x /usr/local/bin/scodex
          sclaude update   # updates Claude and Codex CLIs inside the shared container
          ```

          **From source:**
          ```bash
          git pull
          sclaude --build
          sudo install -m 0755 sclaude /usr/local/bin/sclaude
          sudo install -m 0755 scodex /usr/local/bin/scodex
          ```
          EOF
          )

          gh release edit "$TAG" --notes "${EXISTING}${INSTALL_INSTRUCTIONS}"
